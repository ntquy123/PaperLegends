# --- T�y ch?n: thay kh?i server tr�n b?ng kh?i redirect n�y n?u mu?n �p HTTPS ---

# Chặn IP / host lạ ở HTTP
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    return 444;
}

 # Domain thật: ép HTTP sang HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name gamenhalam.com www.gamenhalam.com;

    return 301 https://gamenhalam.com$request_uri;
}
 
 # Chặn IP / host lạ ở HTTPS
server {
    listen 443 ssl default_server;
    listen [::]:443 ssl default_server;
    server_name _;

    ssl_certificate     /etc/nginx/ssl/gamenhalam.com/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/gamenhalam.com/private.pem;

    return 444;
}

############################################################
# 2) HTTPS server (port 443) (gamenhalam.com)
############################################################
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name gamenhalam.com;

    # �u?ng d?n ch?ng ch? (thay b?ng file th?t)
    ssl_certificate     /etc/nginx/ssl/gamenhalam.com/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/gamenhalam.com/private.pem;

    # ssl_certificate  /etc/nginx/ssl/nginx.crt; 
    # ssl_certificate_key  /etc/nginx/ssl/nginx.key;

    # Khuy?n ngh? TLS
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:50m;
    ssl_prefer_server_ciphers on;

    # Kích hoạt OCSP Stapling (DigiCert báo bạn đang tắt cái này)
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 8.8.8.8 8.8.4.4;

    # Paper Legends dùng chung domain gamenhalam.com, tách bằng path /paper-legends/.
    # File này phải được include trong server block, không include trực tiếp ở http context.
    include /etc/nginx/conf.d/PaperLegends_nginx.conf;

location = /admin {
    return 301 $scheme://$http_host/admin/;
}
    # Serve admin static (HTTP)
    location /admin/ {
         alias /var/www/BanCuLi_Backend/public/admin/; 
    
    index index.html;
    try_files $uri $uri/ /admin/index.html;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # API qua HTTPS
    location / {
        proxy_pass http://api_http;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_cache_bypass $http_upgrade;
    }

    # WebSocket qua HTTPS
    location /ws/ {
        proxy_pass http://ws_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_cache_bypass $http_upgrade;
    }

    # Static addressables qua HTTPS
    location /addressables/ {
        alias /var/www/addressables/;
        autoindex on;
        add_header Access-Control-Allow-Origin * always;
        add_header Access-Control-Allow-Methods 'GET, OPTIONS' always;
        add_header Access-Control-Allow-Headers '*' always;
    }

 


    # Tu? ch?n th�m
    client_max_body_size 50m;   # n?u c?n upload l?n
    gzip on;                    # n�n n?i dung text
}
