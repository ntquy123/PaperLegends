map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# Khai b�o upstream d? t�i s? d?ng
upstream api_http {
    server 127.0.0.1:5000;
}
upstream ws_backend {
    server 127.0.0.1:5000;
}

