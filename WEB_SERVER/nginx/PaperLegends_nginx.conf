# Paper Legends routes for the shared gamenhalam.com server.
#
# This file is a server-context snippet. Include it inside the existing
# `server { listen 443 ssl http2; server_name gamenhalam.com; ... }` block.
# Do not load it directly from nginx.conf/http context because `location`
# directives are only valid inside a server block.
#
# Public paths:
# - https://gamenhalam.com/paper-legends/
# - https://gamenhalam.com/paper-legends/admin/
# - wss://gamenhalam.com/paper-legends/ws/
# - https://gamenhalam.com/paper-legends/addressables/

location = /paper-legends {
    return 301 $scheme://$http_host/paper-legends/;
}

location = /paper-legends/admin {
    return 301 $scheme://$http_host/paper-legends/admin/;
}

location = /paper-legends/addressables {
    return 301 $scheme://$http_host/paper-legends/addressables/;
}

location /paper-legends/admin/ {
    alias /var/www/PaperLegend-WEB/public/admin/;
    index index.html;
    try_files $uri $uri/ /index.html;
    add_header Cache-Control "no-store, no-cache, must-revalidate";
}

location /paper-legends/addressables/ {
    alias /var/www/paper-legends-addressables/;
    autoindex on;
    try_files $uri $uri/ =404;
    add_header Access-Control-Allow-Origin * always;
    add_header Access-Control-Allow-Methods 'GET, OPTIONS' always;
    add_header Access-Control-Allow-Headers '*' always;
    add_header Cache-Control "public, max-age=31536000, immutable" always;
}

location /paper-legends/ws/ {
    rewrite ^/paper-legends/ws/?(.*)$ /ws/$1 break;
    proxy_pass http://127.0.0.1:5001;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;
    proxy_cache_bypass $http_upgrade;
}

location /paper-legends/ {
    rewrite ^/paper-legends/?(.*)$ /$1 break;
    proxy_pass http://127.0.0.1:5001;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_cache_bypass $http_upgrade;
}
